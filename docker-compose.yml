version: '3.9'

services:
  app:
    build: .
    container_name: valeurs-africaines
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "False"
      FLASK_PORT: 5000
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-with-a-secure-random-string}
      VA_ADMIN_PASSWORD: ${VA_ADMIN_PASSWORD:-va-admin-2026}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_LIST_ID: ${BREVO_LIST_ID:-}
      SUBSTACK_URL: ${SUBSTACK_URL:-}
    volumes:
      - ./app/data_store.json:/app/app/data_store.json
      - ./app/site.db:/app/app/site.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
