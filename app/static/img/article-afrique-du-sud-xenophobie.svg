<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e30613"/>
      <stop offset="100%" stop-color="#ff4444"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Carte Afrique du Sud simplifiée -->
  <path d="M400,80 L520,120 L580,200 L560,320 L480,380 L350,400 L280,350 L250,280 L280,200 L320,120 Z"
        fill="none" stroke="#e30613" stroke-width="2" opacity="0.4"/>

  <!-- Points de violence -->
  <circle cx="520" cy="280" r="8" fill="#e30613" opacity="0.8"/>
  <text x="535" y="285" fill="#ffffff" font-family="sans-serif" font-size="11">Johannesburg</text>
  <circle cx="450" cy="340" r="6" fill="#e30613" opacity="0.6"/>
  <text x="465" y="345" fill="#ffffff" font-family="sans-serif" font-size="11">Durban</text>

  <!-- Titre -->
  <text x="40" y="50" fill="#ffffff" font-family="Georgia,serif" font-size="22" font-weight="bold">
    Afrique du Sud : la crise xénophobe
  </text>
  <text x="40" y="78" fill="#e30613" font-family="Georgia,serif" font-size="16">
    Entre pression sociale et échec politique
  </text>

  <!-- Stats clés -->
  <rect x="40" y="110" width="220" height="70" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="60" y="137" fill="#e30613" font-family="sans-serif" font-size="28" font-weight="bold">12</text>
  <text x="95" y="137" fill="#cccccc" font-family="sans-serif" font-size="13">morts en avril 2026</text>
  <text x="60" y="162" fill="#999999" font-family="sans-serif" font-size="11">Durban et Johannesburg</text>

  <rect x="40" y="195" width="220" height="70" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="60" y="222" fill="#e30613" font-family="sans-serif" font-size="28" font-weight="bold">61%</text>
  <text x="105" y="222" fill="#cccccc" font-family="sans-serif" font-size="13">chômage jeunes (15-24 ans)</text>
  <text x="60" y="247" fill="#999999" font-family="sans-serif" font-size="11">Coefficient de Gini : 0,63</text>

  <rect x="40" y="280" width="220" height="70" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="60" y="307" fill="#e30613" font-family="sans-serif" font-size="28" font-weight="bold">200</text>
  <text x="95" y="307" fill="#cccccc" font-family="sans-serif" font-size="13">arrestations</text>
  <text x="60" y="332" fill="#999999" font-family="sans-serif" font-size="11">Opération Dudula en campagne</text>

  <!-- Timeline droite -->
  <text x="580" y="120" fill="#999999" font-family="sans-serif" font-size="11">Crise xénophobe cycle</text>
  <line x1="600" y1="135" x2="600" y2="370" stroke="#333333" stroke-width="1"/>

  <circle cx="600" cy="150" r="4" fill="#e30613"/>
  <text x="615" y="154" fill="#cccccc" font-family="sans-serif" font-size="11">2008 — 62 morts</text>

  <circle cx="600" cy="190" r="3" fill="#ff4444"/>
  <text x="615" y="194" fill="#cccccc" font-family="sans-serif" font-size="11">2015 — 7 morts</text>

  <circle cx="600" cy="230" r="3" fill="#ff4444"/>
  <text x="615" y="234" fill="#cccccc" font-family="sans-serif" font-size="11">2019 — 10 morts</text>

  <circle cx="600" cy="270" r="3" fill="#ff4444"/>
  <text x="615" y="274" fill="#cccccc" font-family="sans-serif" font-size="11">2021 — vague de violences</text>

  <circle cx="600" cy="315" r="6" fill="#e30613"/>
  <text x="615" y="319" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">2026 — 12 morts</text>
  <line x1="600" y1="315" x2="660" y2="315" stroke="#e30613" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Footer -->
  <text x="400" y="430" text-anchor="middle" fill="#555555" font-family="sans-serif" font-size="11">Valeurs Africaines — Analyse géopolitique</text>
</svg>
