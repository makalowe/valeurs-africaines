  <text x="100" y="228" fill="#ccc" font-size="12">milliards $ levés en 2025</text>
  <text x="60" y="250" fill="#999" font-size="11">1er pays d'Afrique subsaharienne</text>

  <rect x="40" y="280" width="220" height="65" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="60" y="308" fill="#e30613" font-size="26" font-weight="bold">85%</text>
  <text x="110" y="308" fill="#ccc" font-size="12">paiements via mobile</text>
  <text x="60" y="330" fill="#999" font-size="11">M-Pesa leader inconteste</text>

  <text x="400" y="430" text-anchor="middle" fill="#555" font-size="11">Valeurs Africaines — Analyse geopolitique</text>
