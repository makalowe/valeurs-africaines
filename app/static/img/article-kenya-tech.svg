  <circle cx="580" cy="180" r="25" fill="#e30613" opacity="0.3"/>
  <text x="580" y="185" text-anchor="middle" fill="#fff" font-size="10">Nairobi</text>

  <!-- Lignes connectivite -->
  <line x1="580" y1="180" x2="450" y2="100" stroke="#e30613" stroke-width="0.5" opacity="0.3"/>
  <line x1="580" y1="180" x2="700" y2="260" stroke="#e30613" stroke-width="0.5" opacity="0.3"/>
  <line x1="580" y1="180" x2="450" y2="280" stroke="#e30613" stroke-width="0.5" opacity="0.3"/>

  <rect x="40" y="120" width="220" height="65" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="60" y="148" fill="#e30613" font-size="26" font-weight="bold">7&</text>
  <text x="95" y="148" fill="#ccc" font-size="12">startups licornes africaines</text>
  <text x="60" y="170" fill="#999" font-size="11">3 sont kenyanes (Safaricom, etc.)</text>

  <rect x="40" y="200" width="220" height="65" rx="6" fill="#ffffff" opacity="0.08"/>
