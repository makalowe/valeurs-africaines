<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1a2e"/><stop offset="100%" stop-color="#1a2a3e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <text x="40" y="55" fill="#ffffff" font-family="Georgia,serif" font-size="24" font-weight="bold">Kenya Tech</text>
  <text x="40" y="80" fill="#e30613" font-family="Georgia,serif" font-size="16">Nairobi, pole numerique africain</text>

  <!-- Cercles tech -->
  <circle cx="580" cy="180" r="80" fill="none" stroke="#e30613" stroke-width="1" opacity="0.2"/>
